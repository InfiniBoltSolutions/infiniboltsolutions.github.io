<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfiniBolt Solutions | Custom Engineering & 3D Printing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --charcoal: #1a1a1a;
            --light-gray: #333333;
            --accent-white: #ffffff;
            --text-gray: #cccccc;
            --navy-blue: #0A192F;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--charcoal);
            color: var(--accent-white);
            line-height: 1.6;
            overflow-x: hidden;
        }

        header {
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--navy-blue);
            border-bottom: 1px solid var(--light-gray);
        }

        .logo-text {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -1px;
        }

        /* --- THE CINEMATIC HERO SECTION --- */
        .hero {
            position: relative;
            height: 80vh; 
            min-height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-color: var(--charcoal);
        }

        /* The Video Background - Fixed Centering */
        .hero-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw; 
            height: 100vh; 
            object-fit: cover; 
            object-position: center center; 
            z-index: 0;
            pointer-events: none;
        }

        /* The Dark Overlay */
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(26, 26, 26, 0.4); 
            z-index: 1;
        }

        /* The Content that will fade away */
        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            width: 100%;
            padding: 0 2rem;
            
            /* The Fade Out Animation */
            animation: fadeOutContent 1s forwards; 
            animation-delay: 1.5s; 
        }

        @keyframes fadeOutContent {
            0% { opacity: 1; visibility: visible; }
            100% { opacity: 0; visibility: hidden; }
        }

        .hero h1 { 
            font-size: 3.5rem; 
            margin-bottom: 1rem; 
            text-shadow: 0 4px 10px rgba(0,0,0,0.8); 
        }
        
        .hero p { 
            font-size: 1.2rem; 
            color: var(--text-gray); 
            max-width: 600px;
